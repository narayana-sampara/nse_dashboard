apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nse-dashboard
resources:
  - production.yaml
configMapGenerator:
  - name: nse-config
    literals:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - METRICS_ENABLED=1
      - OTEL_SERVICE_NAME=nse-dashboard-api
      - OTEL_TRACE_SAMPLE_RATIO=0.1
      - WORKER_SCHEDULE_SECONDS=300
