apiVersion: v1
kind: Secret
metadata:
  name: nse-secrets
  namespace: nse-dashboard
type: Opaque
stringData:
  DATABASE_URL: postgresql://user:password@postgres.example:5432/nse_dashboard
  REDIS_URL: redis://redis.example:6379/0
  CELERY_BROKER_URL: redis://redis.example:6379/1
  CELERY_RESULT_BACKEND: redis://redis.example:6379/2
  WEBSOCKET_TOKENS: replace-with-secret-manager-value
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability:4317
